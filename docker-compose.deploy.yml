# TMS SaaS (Thiga) — produção com Traefik existente (stack Nexts).
# Uso: docker compose --env-file .env.deploy -f docker-compose.deploy.yml up -d --build
#
# DNS: tms, tms.wuzapi, mtms, s3tms @ conext.click → IP do servidor
# Traefik/Portainer já correm em realindependente (nexts-network).

services:
  tms-postgres:
    image: postgres:15-alpine
    container_name: tms-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: tms_saas
      POSTGRES_USER: tms_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tms_password_prod}
    volumes:
      - tms_postgres_data:/var/lib/postgresql/data
    networks:
      - nexts-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tms_user -d tms_saas"]
      interval: 5s
      timeout: 5s
      retries: 12

  tms-redis:
    image: redis:7-alpine
    container_name: tms-redis
    restart: unless-stopped
    volumes:
      - tms_redis_data:/data
    networks:
      - nexts-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: thiga-app:latest
    container_name: tms-app
    restart: unless-stopped
    working_dir: /var/www
    user: root
    env_file:
      - .env.production
    volumes:
      - ./.env.production:/var/www/.env:ro
      - ./app:/var/www/app:ro
      - ./database:/var/www/database:ro
      - ./public:/var/www/public:ro
      - ./resources:/var/www/resources:ro
      - ./routes:/var/www/routes:ro
      - tms_app_storage:/var/www/storage
      - tms_app_bootstrap_cache:/var/www/bootstrap/cache
    depends_on:
      tms-postgres:
        condition: service_healthy
      tms-redis:
        condition: service_started
      tms-minio:
        condition: service_started
    networks:
      - nexts-network
    command: >
      sh -c "mkdir -p storage/framework/sessions storage/framework/views storage/framework/cache/data storage/logs storage/app/public bootstrap/cache
      && chown -R www:www storage bootstrap/cache
      && chmod -R 777 storage/framework bootstrap/cache
      && (test -f vendor/autoload.php || composer install --no-dev --optimize-autoloader --no-interaction)
      && php artisan migrate --force --no-interaction
      && php artisan storage:link 2>/dev/null || true
      && php-fpm"

  web:
    image: nginx:alpine
    container_name: tms-web
    restart: unless-stopped
    volumes:
      - ./docker/nginx/traefik.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/public:ro
    depends_on:
      - app
    networks:
      - nexts-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=nexts-network
      - traefik.http.routers.tms-web.rule=Host(`tms.conext.click`)
      - traefik.http.routers.tms-web.entrypoints=websecure
      - traefik.http.routers.tms-web.tls.certresolver=le
      - traefik.http.routers.tms-web.service=tms-web
      - traefik.http.services.tms-web.loadbalancer.server.port=80
      - traefik.http.services.tms-web.loadbalancer.passHostHeader=true

  queue:
    image: thiga-app:latest
    container_name: tms-queue
    restart: unless-stopped
    working_dir: /var/www
    user: www
    env_file:
      - .env.production
    volumes:
      - ./.env.production:/var/www/.env:ro
      - tms_app_storage:/var/www/storage
      - tms_app_bootstrap_cache:/var/www/bootstrap/cache
    depends_on:
      tms-postgres:
        condition: service_healthy
      tms-redis:
        condition: service_started
      app:
        condition: service_started
    networks:
      - nexts-network
    command: php artisan queue:work --verbose --tries=3 --timeout=90 --sleep=3

  schedule:
    image: thiga-app:latest
    container_name: tms-schedule
    restart: unless-stopped
    working_dir: /var/www
    user: www
    env_file:
      - .env.production
    volumes:
      - ./.env.production:/var/www/.env:ro
      - tms_app_storage:/var/www/storage
    depends_on:
      app:
        condition: service_started
    networks:
      - nexts-network
    command: php artisan schedule:work

  tms-minio:
    image: minio/minio:latest
    container_name: tms-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: tms_minio_user
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-tms_minio_password_prod}
      MINIO_SERVER_URL: https://s3tms.conext.click
      MINIO_BROWSER_REDIRECT_URL: https://mtms.conext.click
    volumes:
      - tms_minio_data:/data
    networks:
      - nexts-network
    command: server /data --console-address ":9001"
    labels:
      - traefik.enable=true
      - traefik.docker.network=nexts-network
      - traefik.http.routers.tms-minio-s3.rule=Host(`s3tms.conext.click`)
      - traefik.http.routers.tms-minio-s3.entrypoints=websecure
      - traefik.http.routers.tms-minio-s3.tls.certresolver=le
      - traefik.http.routers.tms-minio-s3.service=tms-minio-api
      - traefik.http.services.tms-minio-api.loadbalancer.server.port=9000
      - traefik.http.routers.tms-minio-console.rule=Host(`mtms.conext.click`)
      - traefik.http.routers.tms-minio-console.entrypoints=websecure
      - traefik.http.routers.tms-minio-console.tls.certresolver=le
      - traefik.http.routers.tms-minio-console.service=tms-minio-console
      - traefik.http.services.tms-minio-console.loadbalancer.server.port=9001

  createbuckets:
    image: minio/mc
    depends_on:
      - tms-minio
    networks:
      - nexts-network
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://tms-minio:9000 tms_minio_user tms_minio_Th1g4_2026_x; do echo 'Waiting for MinIO...'; sleep 2; done;
      /usr/bin/mc mb local/thiga 2>/dev/null || true;
      /usr/bin/mc anonymous set public local/thiga 2>/dev/null || true;
      exit 0;
      "

  tms-wuzapi:
    image: asternic/wuzapi:latest
    container_name: tms-wuzapi
    restart: unless-stopped
    environment:
      WUZAPI_ADMIN_TOKEN: ${WUZAPI_ADMIN_TOKEN:-admin123456}
      API_KEY: ${WUZAPI_ADMIN_TOKEN:-admin123456}
      WUZAPI_HTTP_PORT: "8080"
      TZ: America/Sao_Paulo
    volumes:
      - tms_wuzapi_data:/app/data
      - tms_wuzapi_sessions:/app/sessions
    networks:
      - nexts-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=nexts-network
      - traefik.http.routers.tms-wuzapi.rule=Host(`tms.wuzapi.conext.click`)
      - traefik.http.routers.tms-wuzapi.entrypoints=websecure
      - traefik.http.routers.tms-wuzapi.tls.certresolver=le
      - traefik.http.routers.tms-wuzapi.service=tms-wuzapi
      - traefik.http.services.tms-wuzapi.loadbalancer.server.port=8080
      - traefik.http.services.tms-wuzapi.loadbalancer.passHostHeader=true

volumes:
  tms_postgres_data:
  tms_redis_data:
  tms_minio_data:
  tms_wuzapi_data:
  tms_wuzapi_sessions:
  tms_app_storage:
  tms_app_bootstrap_cache:

networks:
  nexts-network:
    external: true
    name: realindependente_nexts-network
